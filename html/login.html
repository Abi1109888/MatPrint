<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 / 注册 · 材印达 MatPrint</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2DBE6C;
  --green-dark:#1A9E55;
  --green-deep:#0D5C32;
  --green-bg:#F0FDF6;
  --ink:#111827;
  --ink2:#374151;
  --white:#FFFFFF;
  --bg:#F7F8FA;
  --border:#E5E7EB;
  --muted:#6B7280;
  --muted2:#9CA3AF;
}
html,body{height:100%;overflow:hidden}
.card-success-mode{overflow-y:auto!important}
body{
  font-family:'Noto Sans SC',sans-serif;
  -webkit-font-smoothing:antialiased;
  font-size:15px;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}

/* 背景图 */
.bg-img{
  position:fixed;inset:0;
  background-image:url('images/hero_printing_factory.jpg');
  background-size:cover;background-position:center;
  opacity:0.18;
  pointer-events:none;
}
.bg-overlay{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, rgba(13,92,50,0.25) 0%, rgba(17,24,39,0.85) 100%);
  pointer-events:none;
}

/* 顶部 Logo */
.top-logo{
  position:fixed;top:0;left:0;right:0;
  height:56px;display:flex;align-items:center;
  padding:0 40px;z-index:10;
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--white)}
.logo-cn{font-size:15px;font-weight:700;color:var(--white)}
.logo-en{font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:2px;text-transform:uppercase;margin-left:2px}

/* 卡片 */
.card{
  position:relative;z-index:5;
  background:var(--white);
  border-radius:18px;
  box-shadow:0 24px 80px rgba(0,0,0,0.35);
  width:100%;max-width:440px;
  padding:36px 40px 32px;
  margin:0 16px;
}

/* 卡片顶部品牌小标 */
.card-brand{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:24px;
}
.card-brand-icon{width:28px;height:28px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--white)}
.card-brand-name{font-size:14px;font-weight:700;color:var(--ink)}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:22px;border-bottom:1.5px solid var(--border)}
.tab{
  flex:1;padding:10px 0;text-align:center;
  font-size:13px;font-weight:700;color:var(--muted2);
  cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;
  transition:all 0.2s;background:transparent;
  border-top:none;border-left:none;border-right:none;font-family:inherit;
}
.tab.active{color:var(--green-dark);border-bottom-color:var(--green)}
.tab:hover:not(.active){color:var(--ink)}

/* FORM */
.form-title{font-size:20px;font-weight:900;letter-spacing:-0.5px;margin-bottom:3px;color:var(--ink)}
.form-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}

/* ROLE */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.role-btn{
  padding:11px 10px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;
  text-align:center;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;border-radius:9px;
}
.role-btn .em{font-size:20px}
.role-btn .sub{font-size:10px;font-weight:400;color:var(--muted2)}
.role-btn:hover{border-color:var(--green);color:var(--ink)}
.role-btn.sel-s,.role-btn.sel-b{border-color:var(--green);background:var(--green-bg);color:var(--green-dark)}
.role-btn.sel-s .sub,.role-btn.sel-b .sub{color:rgba(26,158,85,0.7)}

/* FIELDS */
.fg{margin-bottom:10px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.fi{
  width:100%;background:var(--bg);
  border:1.5px solid var(--border);
  padding:9px 13px;font-size:13px;color:var(--ink);
  font-family:inherit;transition:all 0.2s;outline:none;border-radius:7px;
}
.fi::placeholder{color:var(--muted2)}
.fi:focus{border-color:var(--green);background:var(--white);box-shadow:0 0 0 3px var(--green-bg)}
.fi.il{padding-left:36px}
.fw{position:relative}
.fw .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:12px;pointer-events:none}
.fw .eye{left:auto;right:12px;cursor:pointer;pointer-events:all;transition:color 0.2s}
.fw .eye:hover{color:var(--green)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PHONE */
.phone-row{display:flex;gap:6px}
.phone-pre{flex-shrink:0;background:var(--bg);border:1.5px solid var(--border);padding:9px 10px;font-size:12px;color:var(--ink);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit;transition:all 0.2s;border-radius:7px}
.phone-pre:hover{border-color:var(--green)}
.send-btn{flex-shrink:0;background:var(--bg);border:1.5px solid var(--border);color:var(--ink);padding:9px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.2s;border-radius:7px}
.send-btn:hover:not(:disabled){background:var(--green);border-color:transparent;color:var(--white)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted2);font-size:11px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* SUBMIT */
.btn-sub{
  width:100%;padding:12px;border:none;
  font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:0.5px;transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:4px;border-radius:9px;
  background:var(--green);color:var(--white);
  box-shadow:0 3px 14px rgba(45,190,108,0.35);
}
.btn-sub:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,190,108,0.4)}

/* THIRDS */
.thirds{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.third-btn{padding:9px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;border-radius:7px}
.third-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--white)}

/* AGREE */
.agree{display:flex;align-items:flex-start;gap:7px;margin:9px 0}
.agree input{margin-top:3px;accent-color:var(--green);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.agree-t{font-size:11px;color:var(--muted);line-height:1.7}
.agree-t a{color:var(--green-dark);text-decoration:none}
.agree-t a:hover{text-decoration:underline}

/* SWITCH / FORGOT */
.switch{text-align:center;margin-top:12px;font-size:12px;color:var(--muted)}
.switch a{color:var(--green-dark);font-weight:700;cursor:pointer;text-decoration:none}
.switch a:hover{text-decoration:underline}
.forgot{text-align:right;margin-bottom:12px}
.forgot a{font-size:11px;color:var(--muted2);text-decoration:none;transition:color 0.2s}
.forgot a:hover{color:var(--green)}

/* PANELS */
.panel{display:none}
.panel.active{display:block}

/* SUCCESS */
.success{display:none;text-align:center;padding:20px 0}
.suc-icon{width:56px;height:56px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--white);margin:0 auto 12px;border-radius:50%;box-shadow:0 6px 24px rgba(45,190,108,0.3);animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.suc-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid rgba(45,190,108,0.2);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--green-dark);margin-bottom:10px}
.suc-title{font-size:20px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px;color:var(--ink)}
.suc-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.btn-loading{opacity:0.75;pointer-events:none}

/* 底部版权 */
.footer-text{
  position:fixed;bottom:20px;
  font-size:11px;color:rgba(255,255,255,0.25);
  letter-spacing:0.5px;z-index:5;
}

@media(max-width:520px){
  html,body{overflow:auto}
  .card{padding:28px 20px 24px;margin:72px 12px 20px}
  body{justify-content:flex-start}
}
</style>
</head>
<body>

<div class="bg-img"></div>
<div class="bg-overlay"></div>

<!-- 顶部 Logo -->
<div class="top-logo">
  <a href="landing.html" class="logo">
    <div class="logo-icon">M</div>
    <span class="logo-cn">材印达</span>
    <span class="logo-en">MatPrint</span>
  </a>
</div>

<!-- 卡片 -->
<div class="card">
  <!-- 品牌小标 -->
  <div class="card-brand">
    <div class="card-brand-icon">M</div>
    <div class="card-brand-name">材印达 MatPrint</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">登录</button>
    <button class="tab" id="tab-reg" onclick="switchTab('reg')">注册</button>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="form-title">欢迎回来 👋</div>
    <div class="form-sub">登录你的材印达账号继续使用</div>
    <div class="fg">
      <label class="fl">账号</label>
      <div class="fw"><i class="ico fa-solid fa-user"></i>
        <input type="text" class="fi il" id="l-acc" placeholder="手机号或邮箱">
      </div>
    </div>
    <div class="fg">
      <label class="fl">密码</label>
      <div class="fw"><i class="ico fa-solid fa-lock"></i>
        <input type="password" class="fi il" id="l-pwd" placeholder="请输入密码">
        <i class="ico eye fa-solid fa-eye" id="eye-l" onclick="toggleEye('l-pwd','eye-l')"></i>
      </div>
    </div>
    <div class="forgot"><a href="#" onclick="showForgot();return false">忘记密码？</a></div>
    <button class="btn-sub" id="login-btn" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> 立即登录
    </button>
    <div class="divider">或使用其他方式</div>
    <div class="thirds">
      <button class="third-btn"><i class="fa-brands fa-weixin" style="color:#07C160;font-size:15px"></i> 微信登录</button>
      <button class="third-btn"><i class="fa-solid fa-mobile-screen" style="font-size:13px"></i> 短信验证</button>
    </div>
    <div class="switch">还没有账号？<a onclick="switchTab('reg')">立即注册 →</a></div>
  </div>

  <!-- REGISTER -->
  <div class="panel" id="panel-reg">
    <div class="form-title">创建账号</div>
    <div class="form-sub">选择你的入驻身份，开始使用材印达</div>
    <div class="role-grid">
      <button class="role-btn" id="rb-s" onclick="pickRole('s')">
        <span class="em">🏭</span><span>供应商</span><span class="sub">工厂 / 印刷厂</span>
      </button>
      <button class="role-btn" id="rb-b" onclick="pickRole('b')">
        <span class="em">🏢</span><span>品牌方</span><span class="sub">品牌 / 广告公司</span>
      </button>
    </div>
    <div class="fg">
      <label class="fl">公司名称</label>
      <div class="fw"><i class="ico fa-solid fa-building"></i>
        <input type="text" class="fi il" id="r-co" placeholder="请输入公司全称">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">联系人</label>
        <div class="fw"><i class="ico fa-solid fa-user"></i>
          <input type="text" class="fi il" id="r-name" placeholder="姓名">
        </div>
      </div>
      <div class="fg">
        <label class="fl">城市</label>
        <div class="fw"><i class="ico fa-solid fa-location-dot"></i>
          <input type="text" class="fi il" id="r-city" placeholder="所在城市">
        </div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">手机号</label>
      <div class="phone-row">
        <button class="phone-pre">🇨🇳 +86</button>
        <input type="tel" class="fi" id="r-phone" placeholder="请输入手机号" style="flex:1">
        <button class="send-btn" id="send-btn" onclick="sendCode()">发送验证码</button>
      </div>
    </div>
    <div class="fg">
      <label class="fl">验证码</label>
      <div class="fw"><i class="ico fa-solid fa-key"></i>
        <input type="text" class="fi il" id="r-code" placeholder="6 位验证码" maxlength="6">
      </div>
    </div>
    <div class="fg">
      <label class="fl">设置密码</label>
      <div class="fw"><i class="ico fa-solid fa-lock"></i>
        <input type="password" class="fi il" id="r-pwd" placeholder="8 位以上，含字母和数字">
        <i class="ico eye fa-solid fa-eye" id="eye-r" onclick="toggleEye('r-pwd','eye-r')"></i>
      </div>
    </div>
    <div class="agree">
      <input type="checkbox" id="agree-cb">
      <div class="agree-t">我已阅读并同意
        <a href="#">《用户服务协议》</a>、<a href="#">《隐私政策》</a> 及
        <a href="login.html#register-supplier" id="agree-link">《供应商入驻协议》</a>
      </div>
    </div>
    <button class="btn-sub" id="reg-btn" onclick="doReg()">
      <i class="fa-solid fa-user-plus"></i> 立即注册
    </button>
    <div class="switch">已有账号？<a onclick="switchTab('login')">直接登录 →</a></div>
  </div>

  <!-- SUCCESS -->
  <div class="success" id="success">
    <div class="suc-icon"><i class="fa-solid fa-check"></i></div>
    <div class="suc-badge"><i class="fa-solid fa-circle-check"></i> 操作成功</div>
    <div class="suc-title" id="suc-title">注册成功！🎉</div>
    <div class="suc-desc" id="suc-desc">欢迎加入材印达！账号已创建，审核通过后即可开始使用。</div>
    <button class="btn-sub" id="goto-dashboard-btn" onclick="gotoDashboard()">
      <i class="fa-solid fa-arrow-right"></i> 进入控制台
    </button>
  </div>
</div>

<div class="footer-text">© 2025 广东材印达科技有限公司 · 深圳</div>

<script>
let role = 's';
function switchTab(t) {
  ['login','reg'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
    document.getElementById('panel-'+id).classList.toggle('active', id===t);
  });
  document.getElementById('success').style.display = 'none';
}
function pickRole(r) {
  role = r;
  document.getElementById('rb-s').className = 'role-btn' + (r==='s' ? ' sel-s' : '');
  document.getElementById('rb-b').className = 'role-btn' + (r==='b' ? ' sel-b' : '');
  const link = document.getElementById('agree-link');
  if (r === 's') { link.textContent = '《供应商入驻协议》'; link.href = '供应商入驻协议.html'; }
  else { link.textContent = '《品牌方服务协议》'; link.href = '品牌方服务协议.html'; }
}
function toggleEye(id, eid) {
  const inp = document.getElementById(id), eye = document.getElementById(eid);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.className = 'ico eye fa-solid ' + (inp.type === 'password' ? 'fa-eye' : 'fa-eye-slash');
}
function sendCode() {
  const ph = document.getElementById('r-phone').value.trim();
  if (!ph || ph.length !== 11) { alert('请输入正确的 11 位手机号'); return; }
  const btn = document.getElementById('send-btn');
  let n = 60; btn.disabled = true; btn.textContent = '已发送 ✓';
  const t = setInterval(() => {
    n--; btn.textContent = n + 's 后重发';
    if (n <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '发送验证码'; }
  }, 1000);
}
// 测试账号
const TEST_ACCOUNTS = {
  'brand@test.com':    { pwd: 'test1234', role: 'b', name: '李明华', company: '某某品牌有限公司' },
  'supplier@test.com': { pwd: 'test1234', role: 's', name: '张伟',   company: '深圳星辰印刷科技' },
};
function doLogin() {
  const a = document.getElementById('l-acc').value.trim();
  const p = document.getElementById('l-pwd').value.trim();
  if (!a) { alert('请输入账号'); return; }
  if (!p) { alert('请输入密码'); return; }
  const btn = document.getElementById('login-btn');
  btn.classList.add('btn-loading');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登录中...';
  setTimeout(() => {
    btn.classList.remove('btn-loading');
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> 立即登录';
    const acc = TEST_ACCOUNTS[a];
    if (acc && acc.pwd === p) {
      role = acc.role;
      showSuccess('login', acc);
    } else {
      alert('账号或密码错误\n\n测试账号：\n品牌方：brand@test.com / test1234\n供应商：supplier@test.com / test1234');
    }
  }, 1200);
}
function doReg() {
  if (!document.getElementById('r-co').value.trim()) { alert('请输入公司名称'); return; }
  if (!document.getElementById('r-name').value.trim()) { alert('请输入联系人姓名'); return; }
  if (!document.getElementById('r-phone').value.trim()) { alert('请输入手机号'); return; }
  if (!document.getElementById('r-code').value.trim()) { alert('请输入验证码'); return; }
  if (document.getElementById('r-pwd').value.trim().length < 8) { alert('密码至少 8 位'); return; }
  if (!document.getElementById('agree-cb').checked) { alert('请同意相关协议'); return; }
  const btn = document.getElementById('reg-btn');
  btn.classList.add('btn-loading');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 注册中...';
  setTimeout(() => {
    btn.classList.remove('btn-loading');
    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> 立即注册';
    showSuccess('reg');
  }, 1800);
}
function showSuccess(type, acc) {
  document.getElementById('panel-login').classList.remove('active');
  document.getElementById('panel-reg').classList.remove('active');
  const s = document.getElementById('success');
  if (type === 'login' && acc) {
    // 写入登录状态到 localStorage，供其他页面读取
    localStorage.setItem('matprint_user', JSON.stringify({
      name: acc.name,
      company: acc.company,
      role: acc.role
    }));
    const roleLabel = acc.role === 's' ? '供应商' : '品牌方';
    document.getElementById('suc-title').textContent = `欢迎回来，${acc.name} 👋`;
    document.getElementById('suc-desc').innerHTML = `${acc.company}<br><span style="font-size:11px;color:var(--muted)">身份：${roleLabel} · 正在跳转...</span>`;
    document.getElementById('goto-dashboard-btn').innerHTML = `<i class="fa-solid fa-arrow-right"></i> 进入${roleLabel}控制台`;
    // 1.5秒后自动跳转
    setTimeout(() => gotoDashboard(), 1500);
  } else {
    const r = role === 's' ? '供应商' : '品牌方';
    document.getElementById('suc-title').textContent = '注册成功！🎉';
    document.getElementById('suc-desc').innerHTML = `欢迎加入材印达！<br>你的 <strong style="color:var(--green-dark)">${r}</strong> 账号已创建，审核通过后即可开始使用。`;
    document.getElementById('goto-dashboard-btn').innerHTML = `<i class="fa-solid fa-arrow-right"></i> 进入${r}控制台`;
  }
  s.style.display = 'block';
  // 成功态：让卡片可滚动以防内容被裁切
  document.querySelector('.card').classList.add('card-success-mode');
}
function showForgot() {
  alert('请联系客服重置密码：\n📱 微信：MatPrint_Service\n📧 邮箱：support@matprint.cn');
}
function gotoDashboard() {
  // 检查是否有来源页（如从社区点发布跳过来的）
  const redirect = localStorage.getItem('matprint_redirect');
  localStorage.removeItem('matprint_redirect');
  const dest = redirect ? redirect : (role === 's' ? 'supplier-dashboard.html' : 'brand-dashboard.html');
  try {
    window.location.replace(dest);
  } catch(e) {
    window.location.href = dest;
  }
}
window.addEventListener('load', () => {
  const h = location.hash;
  if (h === '#register' || h === '#register-supplier') { switchTab('reg'); pickRole('s'); }

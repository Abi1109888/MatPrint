<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布需求 · 材印达 MatPrint</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1DB954;--green2:#0EA847;--ink:#0D1117;--ink2:#1C2333;--ink3:#374151;
  --white:#fff;--bg:#F0F2F5;--card:#fff;--border:rgba(0,0,0,0.07);
  --muted:#6B7280;--muted2:#9CA3AF;--sidebar:240px;--radius:16px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
/* 侧边栏 */
.sidebar{width:var(--sidebar);background:var(--ink2);display:flex;flex-direction:column;padding:0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:24px 20px 20px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-icon{width:32px;height:32px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.sb-logo-cn{font-size:14px;font-weight:700;color:#fff}
.sb-logo-en{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px}
.sb-user-card{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:700;color:#fff}
.sb-role-tag{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.sb-group{font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;text-transform:uppercase;padding:16px 20px 6px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);text-decoration:none;transition:all 0.18s;border-left:3px solid transparent;position:relative}
.sb-link:hover{color:#fff;background:rgba(255,255,255,0.05);border-left-color:rgba(255,255,255,0.2)}
.sb-link.active{color:#fff;background:rgba(29,185,84,0.12);border-left-color:var(--green)}
.si{width:16px;text-align:center;flex-shrink:0}
.badge{margin-left:auto;background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px}
.soon{margin-left:auto;font-size:9px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.07);padding:1px 6px;border-radius:4px}
.sb-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.sb-exit{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.18s}
.sb-exit:hover{color:#EF4444}
/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar-breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.topbar-breadcrumb strong{color:var(--ink)}
.sep{opacity:0.3}
.content{padding:28px;flex:1}
/* 表单卡片 */
.form-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:28px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.form-card-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-card-title i{color:var(--green)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:border 0.2s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,185,84,0.08)}
textarea{resize:vertical;min-height:100px;line-height:1.7}
/* 品类选择 */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
.cat-btn{border:1.5px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.18s;background:#fff;font-family:inherit}
.cat-btn:hover{border-color:var(--green);background:#F0FDF6}
.cat-btn.sel{border-color:var(--green);background:#F0FDF6;box-shadow:0 0 0 3px rgba(29,185,84,0.1)}
.cat-icon{font-size:24px;margin-bottom:6px}
.cat-name{font-size:11px;font-weight:700;color:var(--ink)}
/* 底部操作 */
.form-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
.btn-cancel{background:transparent;border:1.5px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;padding:10px 24px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all 0.18s;text-decoration:none;display:inline-flex;align-items:center}
.btn-cancel:hover{border-color:var(--ink);color:var(--ink)}
.btn-submit{background:var(--green);border:none;color:#fff;font-size:13px;font-weight:700;padding:10px 28px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-submit:hover{background:var(--green2);transform:translateY(-1px)}
/* AI提示 */
.ai-tip{background:linear-gradient(135deg,#F0FDF6,#DCFCE7);border:1px solid rgba(29,185,84,0.2);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ai-tip i{color:var(--green);font-size:18px;flex-shrink:0}
.ai-tip-text{font-size:12px;color:var(--ink3);line-height:1.6}
.ai-tip-text strong{color:var(--green);font-weight:700}
</style>
</head>
<body>
<aside class="sidebar">
  <a href="landing.html" class="sb-logo">
    <div class="sb-logo-icon">M</div>
    <div><div class="sb-logo-cn">材印达</div><div class="sb-logo-en">MatPrint</div></div>
  </a>
  <div class="sb-user-card">
    <div class="sb-ava">李</div>
    <div><div class="sb-uname">李明华</div><div class="sb-role-tag"><i class="fa-solid fa-circle-check" style="font-size:8px"></i> 品牌方账号</div></div>
  </div>
  <div class="sb-group">社区</div>
  <a href="community.html" class="sb-link"><i class="si fa-solid fa-fire" style="color:#F97316"></i> 创意社区</a>
  <div class="sb-group">工作台</div>
  <a href="brand-dashboard.html" class="sb-link"><i class="si fa-solid fa-gauge-high"></i> 控制台</a>
  <a href="new-order.html" class="sb-link active"><i class="si fa-solid fa-circle-plus"></i> 发布需求</a>
  <a href="order-list.html" class="sb-link"><i class="si fa-solid fa-list-check"></i> 我的订单<span class="badge">3</span></a>
  <div class="sb-group">采购</div>
  <a href="#" class="sb-link" onclick="alert('供应商市场即将上线')"><i class="si fa-solid fa-store"></i> 供应商市场<span class="soon">即将上线</span></a>
  <a href="#" class="sb-link" onclick="alert('收藏功能开发中')"><i class="si fa-solid fa-heart"></i> 收藏供应商</a>
  <a href="#" class="sb-link" onclick="alert('报价管理开发中')"><i class="si fa-solid fa-file-invoice-dollar"></i> 报价管理</a>
  <div class="sb-group">财务</div>
  <a href="settlement.html" class="sb-link"><i class="si fa-solid fa-wallet"></i> 结算中心</a>
  <a href="#" class="sb-link" onclick="alert('发票管理开发中')"><i class="si fa-solid fa-receipt"></i> 发票管理</a>
  <div class="sb-group">账号</div>
  <a href="#" class="sb-link" onclick="alert('账号设置开发中')"><i class="si fa-solid fa-gear"></i> 账号设置</a>
  <div class="sb-bottom">
    <a href="login.html" class="sb-exit"><i class="fa-solid fa-right-from-bracket"></i> 退出登录</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-breadcrumb">
      <span>材印达</span><span class="sep">/</span>
      <a href="brand-dashboard.html" style="color:var(--muted);text-decoration:none">工作台</a>
      <span class="sep">/</span><strong>发布需求</strong>
    </div>
    <div style="display:flex;gap:8px">
      <a href="brand-dashboard.html" class="btn-cancel" style="font-size:12px;padding:7px 16px">← 返回控制台</a>
    </div>
  </div>

  <div class="content">
    <div class="ai-tip">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      <div class="ai-tip-text"><strong>AI 智能匹配</strong>：填写需求后，系统将在 <strong>24 小时内</strong> 为你推荐最优供应商，平均响应时间 3 小时。</div>
    </div>

    <!-- 选择品类 -->
    <div class="form-card">
      <div class="form-card-title"><i class="fa-solid fa-grid-2"></i> 选择物料品类</div>
      <div class="cat-grid" id="catGrid">
        <button class="cat-btn sel" onclick="selCat(this)"><div class="cat-icon">🖨️</div><div class="cat-name">大幅面喷绘</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">🏗️</div><div class="cat-name">展台搭建</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">📦</div><div class="cat-name">包装印刷</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">🪧</div><div class="cat-name">易拉宝/展架</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">🏷️</div><div class="cat-name">标识标牌</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">🛍️</div><div class="cat-name">促销物料</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">🖼️</div><div class="cat-name">文化墙</div></button>
        <button class="cat-btn" onclick="selCat(this)"><div class="cat-icon">✨</div><div class="cat-name">其他定制</div></button>
      </div>
    </div>

    <!-- 需求详情 -->
    <div class="form-card">
      <div class="form-card-title"><i class="fa-solid fa-file-lines"></i> 需求详情</div>
      <div class="form-grid">
        <div class="fg full">
          <label>需求标题</label>
          <input type="text" placeholder="例：2025深圳车展 · 大型喷绘背景板 × 8张" id="req-title">
        </div>
        <div class="fg full">
          <label>详细描述</label>
          <textarea placeholder="请描述具体规格、材质要求、工艺要求、使用场景等..." id="req-desc"></textarea>
        </div>
        <div class="fg">
          <label>数量</label>
          <input type="text" placeholder="例：8张 / 500套" id="req-qty">
        </div>
        <div class="fg">
          <label>预算范围</label>
          <select id="req-budget">
            <option>1万以内</option>
            <option>1-5万</option>
            <option selected>5-10万</option>
            <option>10-50万</option>
            <option>50万以上</option>
          </select>
        </div>
        <div class="fg">
          <label>期望交付日期</label>
          <input type="date" id="req-date">
        </div>
        <div class="fg">
          <label>交付城市</label>
          <input type="text" placeholder="例：深圳、广州、上海" id="req-city">
        </div>
      </div>
    </div>

    <!-- 联系信息 -->
    <div class="form-card">
      <div class="form-card-title"><i class="fa-solid fa-user"></i> 联系信息</div>
      <div class="form-grid-3">
        <div class="fg">
          <label>联系人</label>
          <input type="text" value="李明华" id="req-contact">
        </div>
        <div class="fg">
          <label>手机号</label>
          <input type="tel" placeholder="请输入手机号" id="req-phone">
        </div>
        <div class="fg">
          <label>公司名称</label>
          <input type="text" value="某某品牌有限公司" id="req-company">
        </div>
      </div>
    </div>

    <div class="form-foot">
      <a href="brand-dashboard.html" class="btn-cancel">取消</a>
      <button class="btn-submit" onclick="submitOrder()"><i class="fa-solid fa-paper-plane"></i> 提交需求</button>
    </div>
  </div>
</div>

<script>
function selCat(el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}
function submitOrder() {
  const title = document.getElementById('req-title').value.trim();
  const desc = document.getElementById('req-desc').value.trim();
  const phone = document.getElementById('req-phone').value.trim();
  if (!title) { alert('请填写需求标题'); return; }
  if (!desc) { alert('请填写详细描述'); return; }
  if (!phone) { alert('请填写手机号'); return; }
  const btn = document.querySelector('.btn-submit');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 提交中...';
  btn.disabled = true;
  setTimeout(() => {
    alert('✅ 需求提交成功！\n\nAI 正在为你匹配供应商，预计 24 小时内收到报价。\n\n订单编号：ORD-2025-' + Math.floor(Math.random()*900+100));
    window.location.href = 'order-list.html';
  }, 1500);
}
// 设置默认日期为30天后
const d = new Date(); d.setDate(d.getDate()+30);
document.getElementById('req-date').value = d.toISOString().split('T')[0];
</script>
</body>
</html>
